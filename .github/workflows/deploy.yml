name: Deploy to GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.redeemertechnologies.com
          username: sales_tracking_user@app.redeemertechnologies.com
          password: sales_tracking_ftp_pass
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/app.redeemertechnologies.com/
